services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: production
    container_name: hejmai_api
    volumes:
      - hejmai_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/estoque.db
      - DATABASE_PATH=/app/data/estoque.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MODEL=llama3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hejmai_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
      target: production
    container_name: hejmai_bot
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8081
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DATABASE_PATH=/app/data/estoque.db
    volumes:
      - hejmai_data:/app/data
    restart: unless-stopped
    networks:
      - hejmai_network

  interface:
    build:
      context: .
      dockerfile: Dockerfile.interface
      target: production
    container_name: hejmai_streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8081
      - BROWSER=false
      - SERVER_HEADLESS=true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hejmai_network

volumes:
  hejmai_data:
    name: hejmai_data

networks:
  hejmai_network:
    name: hejmai_network
    driver: bridge
