# =============================================================================
# Paths: Categorias - Hejmai API
# =============================================================================

categorias_list:
  get:
    summary: "Listar categorias"
    description: "Retorna todas as categorias de produtos cadastradas."
    operationId: "listarCategorias"
    tags:
      - "categorias"
    responses:
      "200":
        description: "Lista de categorias"
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../openapi.yaml#/components/schemas/Categoria"

categoria_create:
  post:
    summary: "Criar categoria"
    description: "Cria uma nova categoria de produtos."
    operationId: "criarCategoria"
    tags:
      - "categorias"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../openapi.yaml#/components/schemas/CategoriaCreate"
    responses:
      "201":
        description: "Categoria criada com sucesso"
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/Categoria"
      "409":
        description: "Categoria já existe"
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/Error"
