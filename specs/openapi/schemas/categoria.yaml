# =============================================================================
# Schema: Categoria - Hejmai API
# =============================================================================

Categoria:
  type: object
  properties:
    id:
      type: integer
      description: Identificador único da categoria
      example: 1
    nome:
      type: string
      description: Nome da categoria
      example: "Mercearia"

CategoriaCreate:
  type: object
  required:
    - nome
  properties:
    nome:
      type: string
      description: Nome da categoria
      example: "Mercearia"
